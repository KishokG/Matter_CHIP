3. App launch before test (run_tests.py) — for each test command, it looks at the app_name column, launches the matching binary with its discriminator/passcode if not already running, waits app_startup_wait seconds, then runs the command. Supports retries, per-test timeout, and stop-on-failure.

4. GitHub Actions → RPi via SSH (matter_ci.yml) — the GitHub runner acts purely as an SSH client. It:

Sets up the key from SSH_PRIVATE_KEY secret
rsyncs the project to the RPi
Injects the service account JSON from GSHEET_SA_KEY_JSON secret
Runs build → fetch → test entirely on the RPi via SSH
Pulls logs/ back and uploads as a workflow artifact
Cleans up the service account key from the RPi at the end
