name: Matter — Build on RPi

on:
  schedule:
    # 00:00 (12 AM) IST, Monday–Friday.
    # GitHub cron is UTC-only. 00:00 IST = 18:30 UTC the PREVIOUS day, so the
    # UTC day-of-week is Sun–Thu (0-4) — that is Mon–Fri in IST. (Do NOT use
    # 1-5 here; that would run Tue–Sat IST.)
    - cron: '30 22 * * 0-4'
  workflow_dispatch:
    inputs:
      pipeline:
        description: >
          'build-only' = build apps only,
          'test-only'  = fetch + run tests (uses existing build on RPi),
          'build-test' = build then run tests
        required: true
        default: "build-only"
        type: choice
        options:
          - build-only
          - test-only
          - build-test
      build_mode:
        description: >
          Build mode (ignored when pipeline=test-only).
          'full'=clone+bootstrap+clean+build,
          'skip-clone'=pull+bootstrap+clean+build,
          'skip-all'=build only
        required: true
        default: "skip-clone"
        type: choice
        options:
          - full
          - skip-clone
          - skip-all
      sdk_branch:
        description: "SDK branch (ignored when pipeline=test-only). Empty = use config."
        required: false
        default: ""
      sdk_sha:
        description: "SDK commit SHA to pin (ignored when pipeline=test-only). Empty = use config."
        required: false
        default: ""
      target_apps:
        description: "Override discovery.include (SDK shorthands, e.g. all-clusters,light,network-manager). Empty = use config."
        required: false
        default: ""
      cluster_filter:
        description: >
          Filter by cluster name (comma-separated, must match cluster in tc_list.json).
          e.g. "Access Control Enforcement" or "Energy EVSE,Door Lock".
          Empty = run all enabled TCs.
        required: false
        default: ""
      tc_filter:
        description: >
          Run specific TC IDs only (comma-separated).
          e.g. "TC-ACE-1.2,TC-ACL-2.3".
          Overrides cluster_filter if both provided. Empty = use cluster_filter or all.
        required: false
        default: ""

# ── Concurrency control ───────────────────────────────────────────────────────
# Only one build runs at a time on the RPi.
# If a manual trigger comes in while cron is queued → it waits behind running job.
# If cron comes in while manual is running → cron waits (cancel-in-progress: false).
concurrency:
  group: matter-ci-build
  cancel-in-progress: false

# Stream Python output live to the Actions log. Without this, print() is
# block-buffered in CI (non-TTY) so long steps (bundle/upload, tests) show
# nothing until they finish. Applies to every step in every job.
env:
  PYTHONUNBUFFERED: "1"

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Validate config — always runs (GitHub cloud runner)
  # ──────────────────────────────────────────────────────────
  validate:
    name: Validate Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Validate build_config.yaml
        run: |
          python3 Matter_CI/scripts/validate_config.py Matter_CI/config/build_config.yaml

      - name: Print pipeline plan
        run: |
          PIPELINE="${{ github.event.inputs.pipeline }}"
          echo "════════════════════════════════════"
          echo "  Pipeline : ${PIPELINE}"
          echo "  Build mode: ${{ github.event.inputs.build_mode }}"
          echo "  SDK branch: ${{ github.event.inputs.sdk_branch || '(from config)' }}"
          echo "  SDK SHA   : ${{ github.event.inputs.sdk_sha || '(from config)' }}"
          echo "════════════════════════════════════"
          case "${PIPELINE}" in
            build-only)  echo "→ Will run: build only" ;;
            test-only)   echo "→ Will run: fetch tests + execute tests (skip build)" ;;
            build-test)  echo "→ Will run: build + fetch tests + execute tests" ;;
          esac

  # ──────────────────────────────────────────────────────────
  # Job 2: Build — skipped when pipeline=test-only
  # timeout-minutes set to 21600 (360 hours) — effectively no limit
  # GitHub default is 6h for all runners including self-hosted
  # ──────────────────────────────────────────────────────────
  build:
    name: Build on Mac mini (Docker)
    runs-on: [self-hosted, mac-mini]
    needs: validate
    # Run on schedule (nightly) OR when pipeline is not test-only
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.pipeline != 'test-only'
    timeout-minutes: 21600

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Print build info
        run: |
          echo "Build mode : ${{ github.event.inputs.build_mode }}"
          echo "Host       : $(hostname)"
          echo "Arch       : $(uname -m)"
          echo "Date       : $(date)"

      - name: Apply target_apps override
        # ONLY on a manual run with a non-empty value. NOTE: on scheduled runs
        # github.event.inputs is null and `null != ''` is TRUE in GitHub
        # Actions — so we must also gate on event_name, otherwise every cron
        # run would execute this with an empty target and disable ALL apps.
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_apps != '' }}
        env:
          TARGET_APPS: ${{ github.event.inputs.target_apps }}
        run: |
          # Apps are resolved dynamically from the SDK (discover_targets.py).
          # Overriding "which apps to build" means flipping the enabled flags in
          # discovery.apps: only the named apps are enabled, all others disabled.
          # Names are SDK shorthands (e.g. all-clusters, light, network-manager)
          # — NOT examples/ folder names.
          python3 - << 'PY'
          import yaml, os, sys
          path = os.path.join(os.environ['GITHUB_WORKSPACE'], 'Matter_CI/config/build_config.yaml')
          raw = {t.strip() for t in os.environ.get('TARGET_APPS', '').split(',') if t.strip()}
          # Belt-and-suspenders: never rewrite the config for an empty target
          # (would disable every app). Leave the committed enabled flags intact.
          if not raw:
              print('target_apps is empty — leaving build_config.yaml unchanged.')
              sys.exit(0)
          with open(path) as f:
              cfg = yaml.safe_load(f)
          disc = cfg.setdefault('discovery', {})
          apps = disc.get('apps')
          if isinstance(apps, list):
              known = {a.get('name') for a in apps if isinstance(a, dict)}
              # Lenient matching: accept the SDK shorthand, or the folder/binary
              # style the user may type (strip chip-/matter- prefix and -app suffix).
              def norm(s):
                  s = s.strip()
                  for p in ('chip-', 'matter-'):
                      if s.startswith(p):
                          s = s[len(p):]
                  return s[:-4] if s.endswith('-app') else s
              norm_known = {}
              for k in known:
                  norm_known.setdefault(norm(k), k)
              target, unknown = set(), []
              for t in raw:
                  if t in known:
                      target.add(t)
                  elif norm(t) in norm_known:
                      target.add(norm_known[norm(t)])
                  else:
                      unknown.append(t)
              if unknown:
                  print(f'WARNING: target_apps not recognized: {sorted(unknown)}')
              if not target:
                  print(f'ERROR: no target_apps matched a config app; refusing to '
                        f'disable everything. Valid names: {sorted(known)}')
                  sys.exit(1)
              for app in apps:
                  app['enabled'] = app.get('name') in target
              print('Enabled apps overridden to:', sorted(target))
          else:
              # legacy include model
              disc['include'] = sorted(raw)
              print('discovery.include set to:', sorted(raw))
          with open(path, 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False, sort_keys=False)
          PY

      - name: Build in Docker (Mac mini)
        env:
          # Image tag follows the SDK branch it was bootstrapped for (see build_image.sh).
          IMAGE: matter-sdk-builder:master
          # full | skip-clone | skip-all — controls clone/pull/bootstrap inside
          # the container (see build_inside_container.sh). Scheduled runs default
          # to skip-clone (pull + clean + bootstrap + build).
          BUILD_MODE: ${{ github.event.inputs.build_mode || 'skip-clone' }}
        run: |
          set -euo pipefail
          # Stable, host-persistent output dir shared with the upload job (both
          # run on the mac-mini runner). NOT runner.temp — that isn't shared
          # across jobs. Concurrency group guarantees one build at a time.
          OUTPUT_DIR="${HOME}/matter-output"
          rm -rf "${OUTPUT_DIR}"          # fresh each run — binaries re-emitted
          mkdir -p "${OUTPUT_DIR}"

          # Persistent ccache — the container is --rm (out/ never persists), so
          # without this every build recompiles cold. Mounting a host ccache dir
          # into the container's ccache dir (/root/.ccache) makes repeat builds
          # mostly cache hits. Survives across runs; first run populates it.
          CCACHE_DIR_HOST="${HOME}/matter-ccache"
          mkdir -p "${CCACHE_DIR_HOST}"

          if ! docker image inspect "${IMAGE}" >/dev/null 2>&1; then
            echo "::error::Docker image ${IMAGE} not found on this runner."
            echo "Build it once with: ./Matter_CI/docker/build_image.sh master"
            exit 1
          fi

          echo "Running build in ${IMAGE} (Linux/arm64 container), mode=${BUILD_MODE}..."
          # SDK lives inside the image; Matter_CI (config + scripts) is mounted
          # read-only from this checkout so config edits need no image rebuild.
          docker run --rm \
            -v "${OUTPUT_DIR}:/output" \
            -v "${GITHUB_WORKSPACE}/Matter_CI:/matter-ci:ro" \
            -v "${CCACHE_DIR_HOST}:/root/.ccache" \
            "${IMAGE}" \
            bash /matter-ci/docker/build_inside_container.sh --mode "${BUILD_MODE}"

      - name: Stage build logs for artifact
        if: always()
        run: |
          OUTPUT_DIR="${HOME}/matter-output"
          mkdir -p artifacts
          cp -r "${OUTPUT_DIR}/build_logs" artifacts/ 2>/dev/null || true
          cp "${OUTPUT_DIR}/build_status.json" artifacts/ 2>/dev/null || true
          cp "${OUTPUT_DIR}/build_report.json" artifacts/ 2>/dev/null || true
          cp "${OUTPUT_DIR}/build_summary.md"  artifacts/ 2>/dev/null || true
          cp "${OUTPUT_DIR}/build-info.json"   artifacts/ 2>/dev/null || true
          ls -R artifacts/ || true

      - name: Upload build summary and error logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-summary-${{ github.run_number }}
          path: artifacts/
          retention-days: 14

      - name: Write job summary
        if: always()
        run: |
          echo "## Matter Build — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Pipeline | ${{ github.event.inputs.pipeline || 'scheduled' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Mode | ${{ github.event.inputs.build_mode || 'skip-clone' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Builder | Mac mini (Docker, Linux/arm64) |" >> $GITHUB_STEP_SUMMARY
          if [[ -f artifacts/build-info.json ]]; then
            echo "| SDK commit | $(python3 -c "import json;print(json.load(open('artifacts/build-info.json')).get('commit_short','?'))" 2>/dev/null) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          # The container renders the per-app table (status / time / size) into
          # build_summary.md; just append it. Fall back to raw status if absent.
          if [[ -f artifacts/build_summary.md ]]; then
            cat artifacts/build_summary.md >> $GITHUB_STEP_SUMMARY
          elif [[ -f artifacts/build_status.json ]]; then
            echo '### Build status' >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat artifacts/build_status.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi


  # ──────────────────────────────────────────────────────────
  # Job 3: Upload to Google Drive
  # ──────────────────────────────────────────────────────────
  upload-artifacts:
    name: Upload to Google Drive
    runs-on: [self-hosted, mac-mini]
    needs: build
    outputs:
      drive_link: ${{ steps.upload.outputs.drive_link }}
    if: |
      always() &&
      needs.build.result == 'success' &&
      (github.event_name == 'schedule' ||
       github.event.inputs.pipeline == 'build-only' ||
       github.event.inputs.pipeline == 'build-test')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Upload artifacts to Google Drive
        id: upload
        if: success()
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: |
          echo "${CREDENTIALS_JSON}" > "${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"
          chmod 600 "${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"

          export GSHEET_SA_KEY_PATH="${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"
          # Binaries + wheels + build-info were emitted by the Docker build into
          # ~/matter-output on this same mac-mini runner. No SDK on the host.
          export MATTER_OUTPUT_DIR="${HOME}/matter-output"

          # Host-side deps (macOS Mac mini has no apt python3-yaml like the RPi).
          pip3 install pyyaml google-auth google-auth-httplib2 google-api-python-client \
            --break-system-packages --quiet

          python3 Matter_CI/scripts/upload_artifacts.py \
            --config Matter_CI/config/build_config.yaml \
            --output "${MATTER_OUTPUT_DIR}"

          if [[ -f Matter_CI/logs/gdrive_link.txt ]]; then
            DRIVE_LINK=$(cat Matter_CI/logs/gdrive_link.txt)
            echo "### 📦 Build Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "🔗 **Download:** ${DRIVE_LINK}" >> $GITHUB_STEP_SUMMARY
            # Pass drive link as job output
            echo "drive_link=${DRIVE_LINK}" >> $GITHUB_OUTPUT
          fi

          rm -f "${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"

  # ──────────────────────────────────────────────────────────
  # Job 4: Send Email Notification
  # ──────────────────────────────────────────────────────────
  notify:
    name: Send Email Notification
    runs-on: [self-hosted, mac-mini]
    needs: [build, upload-artifacts]
    if: |
      always() &&
      (github.event_name == 'schedule' ||
       github.event.inputs.pipeline == 'build-only' ||
       github.event.inputs.pipeline == 'build-test')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Send email notification
        env:
          GMAIL_SENDER:        ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAILS:       ${{ secrets.NOTIFY_EMAILS }}
        run: |
          # Host-side deps (macOS has no apt python3-yaml like the RPi).
          pip3 install pyyaml --break-system-packages --quiet

          export MATTER_OUTPUT_DIR="${HOME}/matter-output"

          BUILD_STATUS="success"
          # Get drive link from upload-artifacts job output
          DRIVE_LINK="${{ needs.upload-artifacts.outputs.drive_link }}"

          # build_status.json is written by the container into ~/matter-output.
          if [[ -f "${MATTER_OUTPUT_DIR}/build_status.json" ]]; then
            FAILED=$(python3 -c "
          import json
          s = json.load(open('${MATTER_OUTPUT_DIR}/build_status.json'))
          print(len([k for k,v in s.items() if v=='FAIL']))
          " 2>/dev/null || echo "0")
            [[ "${FAILED}" -gt 0 ]] && BUILD_STATUS="partial"
          fi

          [[ "${{ needs.build.result }}" == "failure" ]] && BUILD_STATUS="failed"

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Read the exact build commit/branch from build-info.json so the email
          # can never disagree with the build / job summary.
          COMMIT=""; BRANCH=""
          if [[ -f "${MATTER_OUTPUT_DIR}/build-info.json" ]]; then
            COMMIT=$(python3 -c "import json;print(json.load(open('${MATTER_OUTPUT_DIR}/build-info.json')).get('commit_short',''))" 2>/dev/null || echo "")
            BRANCH=$(python3 -c "import json;print(json.load(open('${MATTER_OUTPUT_DIR}/build-info.json')).get('branch',''))" 2>/dev/null || echo "")
          fi

          python3 Matter_CI/scripts/notify.py \
            --config     Matter_CI/config/build_config.yaml \
            --status     "${BUILD_STATUS}" \
            --drive-link "${DRIVE_LINK}" \
            --run-id     "${{ github.run_number }}" \
            --run-url    "${RUN_URL}" \
            --commit     "${COMMIT}" \
            --branch     "${BRANCH}"


  # ──────────────────────────────────────────────────────────
  # Job 3: Fetch test commands from Google Sheet
  # Runs when pipeline = test-only OR build-test
  # When test-only: no dependency on build job
  # When build-test: depends on build job
  # ──────────────────────────────────────────────────────────
  fetch-tests:
    name: Fetch Test Commands
    runs-on: [self-hosted, rpi]
    needs: [validate, build]
    if: |
      always() &&
      (github.event.inputs.pipeline == 'test-only' ||
       github.event.inputs.pipeline == 'build-test') &&
      (needs.validate.result == 'success') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Storage monitor & cleanup
        if: always()
        run: |
          bash Matter_CI/scripts/cleanup.sh             --keep-runs 10             --min-free-gb 10 || true
          # || true — cleanup warning doesn't block the build
          # Script exits with code 1 only on CRITICAL (<5GB)

      - name: Deploy service account key
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: |
          echo "${CREDENTIALS_JSON}" > "${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"
          chmod 600 "${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"

      - name: Install Google API libs
        run: |
          pip3 install google-auth google-auth-httplib2 google-api-python-client \
            --break-system-packages --quiet

      - name: Fetch test commands from Google Sheet
        run: |
          export GSHEET_SA_KEY_PATH="${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"
          export CLUSTER_FILTER="${{ github.event.inputs.cluster_filter }}"
          export TC_FILTER="${{ github.event.inputs.tc_filter }}"
          python3 Matter_CI/scripts/fetch_test_commands.py \
            --config Matter_CI/config/build_config.yaml

      - name: Cleanup SA key
        if: always()
        run: rm -f "${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"

      - name: Upload test_commands.json
        uses: actions/upload-artifact@v4
        with:
          name: test-commands-${{ github.run_number }}
          path: Matter_CI/logs/test_commands.json
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Job 4: Run tests + generate HTML report
  # ──────────────────────────────────────────────────────────
  run-tests:
    name: Run Tests
    runs-on: [self-hosted, rpi]
    needs: fetch-tests
    if: |
      always() &&
      needs.fetch-tests.result == 'success'
    timeout-minutes: 21600

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download test_commands.json from fetch-tests job
        uses: actions/download-artifact@v4
        with:
          name: test-commands-${{ github.run_number }}
          path: Matter_CI/logs/

      - name: Prepare RPi (download bundle, checkout SDK, install)
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: |
          # Pull the binaries+wheels the Mac mini built and staged on Drive,
          # checkout the SDK to that exact commit, and place binaries/wheels
          # where run_tests.py expects — so run_tests.py runs UNCHANGED.
          echo "${CREDENTIALS_JSON}" > "${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"
          chmod 600 "${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"
          export GSHEET_SA_KEY_PATH="${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"

          pip3 install google-auth google-api-python-client \
            --break-system-packages --quiet

          python3 Matter_CI/scripts/prepare_rpi_tests.py \
            --config Matter_CI/config/build_config.yaml

          rm -f "${GITHUB_WORKSPACE}/Matter_CI/config/service_account.json"

      - name: Run test suite
        run: |
          export MATTER_SDK_DIR=$(python3 -c "
          import yaml
          cfg = yaml.safe_load(open('Matter_CI/config/build_config.yaml'))
          print(cfg['rpi']['sdk_dir'])
          ")
          python3 Matter_CI/scripts/run_tests.py \
            --config   Matter_CI/config/build_config.yaml \
            --commands Matter_CI/logs/test_commands.json

      - name: Save results to permanent location on RPi
        if: always()
        run: |
          RESULTS_DIR="/home/ubuntu/matter-ci-results/run-${{ github.run_number }}"
          mkdir -p "${RESULTS_DIR}"
          cp -r Matter_CI/logs/* "${RESULTS_DIR}/" 2>/dev/null || true
          echo "Results saved to: ${RESULTS_DIR}"
          echo "Files:"
          ls -la "${RESULTS_DIR}/"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            Matter_CI/logs/report.html
            Matter_CI/logs/test_results.json
            Matter_CI/logs/test_runs/
          retention-days: 30

      - name: Write test summary
        if: always()
        run: |
          echo "## Matter Test Results — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Show WHICH commit the DUT binaries were built at (from the bundle).
          if [[ -f Matter_CI/logs/build-info.json ]]; then
            COMMIT=$(python3 -c "import json;d=json.load(open('Matter_CI/logs/build-info.json'));print(d.get('commit_short') or d.get('commit','unknown'))")
            BRANCH=$(python3 -c "import json;d=json.load(open('Matter_CI/logs/build-info.json'));print(d.get('branch','unknown'))")
            BDATE=$(python3 -c "import json;d=json.load(open('Matter_CI/logs/build-info.json'));print(d.get('date',''))")
            echo "**SDK commit under test:** \`${COMMIT}\` (branch \`${BRANCH}\`${BDATE:+, built ${BDATE}})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -f Matter_CI/logs/test_results.json ]]; then
            python3 - << 'PY'
          import json, os
          results   = json.load(open('Matter_CI/logs/test_results.json'))
          total     = len(results)
          passed    = sum(1 for r in results if r['status'] == 'PASS')
          pass_warn = sum(1 for r in results if r['status'] == 'PASS*')
          failed    = sum(1 for r in results if r['status'] == 'FAIL')
          rerun     = sum(1 for r in results if r['status'] == 'RERUN')
          errors    = sum(1 for r in results if r['status'] == 'ERROR')
          cancelled = sum(1 for r in results if r['status'] == 'CANCEL')
          summary_file = os.environ['GITHUB_STEP_SUMMARY']

          # GitHub sizes EACH markdown table to its own content, so separate
          # per-status tables render at different widths (that's the non-uniform
          # look). To keep columns uniform we use ONE severity-ordered table — the
          # Status column marks the category, failures sort first. (Job summaries
          # strip JS, so live filter buttons live in the HTML report artifact.)
          ORDER = {"FAIL": 0, "ERROR": 1, "RERUN": 2, "PASS*": 3, "CANCEL": 4, "PASS": 5}
          ordered = sorted(results, key=lambda r: (ORDER.get(r["status"], 9),
                                                   r.get("test_case_id", "")))

          def esc(s):
              return str(s).replace("|", "\\|").replace("\n", " ")

          def steps_cell(r):
              c = r.get("counts", {}) or {}
              st = c.get("step_total", 0)
              if st:
                  sk = c.get("step_skipped", 0)
                  fl = c.get("step_failed", 1 if r["status"] == "FAIL" else 0)
                  ps = c.get("step_passed", max(st - sk - fl, 0))
                  return f"✅{ps} ❌{fl} ⏭{sk} Σ{st}"
              if "executed" in c:   # fallback: mobly test-level counts
                  return (f"✅{c.get('passed',0)} ❌{c.get('failed',0)} "
                          f"⏭{c.get('skipped',0)} ⚠️{c.get('error',0)}")
              return ""

          # Straggler check: which TCs found a leftover DUT still running before
          # they launched (a kill-race that can break commissioning/AccessChecker).
          stragglers = [(r["test_case_id"], (r.get("counts") or {}).get("stragglers_before", 0))
                        for r in results if (r.get("counts") or {}).get("stragglers_before", 0)]

          with open(summary_file, 'a') as f:
              f.write(f"| Total | Pass | Pass* | Fail | Rerun | Error | Cancelled |\n")
              f.write(f"|---|---|---|---|---|---|---|\n")
              f.write(f"| {total} | {passed} | {pass_warn} | {failed} | {rerun} | {errors} | {cancelled} |\n\n")
              if stragglers:
                  f.write(f"> ⚠️ **Leftover DUT processes detected before {len(stragglers)} test(s)** "
                          f"(a previous test's app was still running — possible kill race, can break "
                          f"commissioning): "
                          + ", ".join(f"{tc} ({n})" for tc, n in stragglers) + "\n\n")
              else:
                  f.write("> ✅ No leftover DUT processes detected between tests.\n\n")
              f.write("> \\*Partial pass — too many steps skipped to accept as a full "
                      "pass. A run with a few skipped steps still counts as PASS when "
                      "enough steps passed (pass_threshold_percent). Skips may be "
                      "PICS/feature-gated or an unmet precondition; see the HTML report / Ctrl Log.\n\n")
              f.write("_Sorted failures-first. The HTML report (in this run's artifacts) "
                      "has live filters + search._\n\n")
              open_attr = " open" if len(ordered) <= 40 else ""
              f.write(f"<details{open_attr}>\n")
              f.write(f"<summary><b>All {len(ordered)} test case(s)</b> — failures first</summary>\n\n")
              f.write("| TC ID | Status | Steps | Note |\n|---|---|---|---|\n")
              for r in ordered:
                  note = esc(r.get("note", ""))[:160]
                  f.write(f"| {esc(r['test_case_id'])} | {r['status']} | "
                          f"{steps_cell(r)} | {note} |\n")
              f.write("\n</details>\n\n")
          PY
          fi
