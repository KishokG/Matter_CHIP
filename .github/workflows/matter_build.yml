ssh ubuntu@<RPI_IP>
echo "paste-the-public-key-here" >> ~/.ssh/authorized_keys
If you're already working directly on the RPi (no separate laptop), you can generate the key on the RPi itself — just make sure to copy the private key content into the GitHub Secret afterward.

