Setup order (follow exactly)
Step 1 — RPi prep
bash
sudo apt install -y git python3 python3-pip python3-venv python3-dev \
  pkg-config libssl-dev libdbus-1-dev libglib2.0-dev libavahi-client-dev \
  ninja-build cmake libgirepository1.0-dev libcairo2-dev unzip rsync

pip3 install --user pyyaml
Step 2 — Generate a CI-only SSH key (on your dev machine)
bash
ssh-keygen -t ed25519 -C "matter-ci-github" -f ~/.ssh/matter_ci_rpi
# No passphrase — CI needs passwordless access
ssh-copy-id -i ~/.ssh/matter_ci_rpi.pub ubuntu@<RPI_IP>
ssh -i ~/.ssh/matter_ci_rpi ubuntu@<RPI_IP> "echo OK"   # test it
Step 3 — Make RPi reachable from GitHub
GitHub Actions cloud runners need to reach your RPi's SSH port. Three options in the SETUP.md — the easiest for a home lab is Tailscale (curl -fsSL https://tailscale.com/install.sh | sh && sudo tailscale up).

Step 4 — Edit config/build_config.yaml
Set sdk.branch, optionally pin sdk.sha, flip enabled: true/false for the apps you want, and set rpi.sdk_dir to where the SDK should live on your RPi.

Step 5 — Add 3 GitHub Secrets
Settings → Secrets and variables → Actions:

SSH_PRIVATE_KEY → cat ~/.ssh/matter_ci_rpi
RPI_HOST → your RPi's IP or hostname
RPI_USER → ubuntu (or pi)
Step 6 — Push and trigger
bash
git push origin main
Or go to Actions → Matter — Build on RPi → Run workflow to trigger manually. The manual trigger has a "Skip SDK clone" checkbox — use it on subsequent runs to skip the 30-60 min clone/bootstrap and only rebuild binaries.

Key design decisions worth knowing
--skip-sdk flag — once the SDK is cloned on the RPi, subsequent runs in the workflow's manual dispatch skip clone + bootstrap entirely, cutting build time significantly.
Ninja parallelism — if the RPi runs out of memory mid-build, change ninja -C to ninja -j2 -C in build.sh. The SETUP.md also has the swap space commands for a RPi with limited RAM.
Config validation runs first on the cheap GitHub runner before any SSH happens — so typos in the YAML fail fast and free.

