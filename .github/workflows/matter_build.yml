  user: "ubuntu"
  sdk_dir: "/home/ubuntu/connectedhomeip"   # ← confirm this path is correct for you
Commit and push:

bash
git add config/build_config.yaml
git commit -m "Set RPi SDK dir"
git push
Step 7 — Trigger the workflow manually (first run)
Go to your repo on GitHub
Click the Actions tab
Click "Matter — Build on RPi" in the left sidebar
Click the "Run workflow" dropdown (top right)
Leave "Skip SDK clone" unchecked (first run needs the full clone)
Click the green "Run workflow" button
Step 8 — Watch it run
Click on the running workflow → you'll see these jobs:

