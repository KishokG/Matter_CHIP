Here's the exact step-by-step process to get your first build running from GitHub.

Step 1 — Push the project to GitHub
On your RPi (or dev machine), create the repo and push:

bash
cd matter-build
git init
git add .
git commit -m "Initial Matter CI build pipeline"
Then go to github.com → New repository → name it matter-build → Create repository (don't add README, .gitignore — keep it empty).

Then push:

bash
git remote add origin https://github.com/YOUR_USERNAME/matter-build.git
git branch -M main
git push -u origin main
Step 2 — Generate SSH key ON the RPi
Since you're working directly on the RPi, generate the key there:

bash
ssh-keygen -t ed25519 -C "matter-ci-github" -f ~/.ssh/matter_ci_rpi
# Press Enter twice — no passphrase
Add the public key to RPi's own authorized_keys so GitHub can SSH back in:

bash
cat ~/.ssh/matter_ci_rpi.pub >> ~/.ssh/authorized_keys
chmod 600 ~/.ssh/authorized_keys
Test it works:

bash
ssh -i ~/.ssh/matter_ci_rpi -o StrictHostKeyChecking=no ubuntu@localhost "echo OK"
# Should print: OK
Step 3 — Find your RPi's IP address
bash
hostname -I
# e.g.  192.168.1.105
Note this down — you need it for the GitHub Secret.

Step 4 — Make RPi reachable from GitHub Actions
GitHub's cloud runners need to reach your RPi over the internet. The easiest way is Tailscale (free, no router config needed):

bash
# On the RPi:
curl -fsSL https://tailscale.com/install.sh | sh
sudo tailscale up
# It prints a URL — open it in browser and log in with Google/GitHub
tailscale ip
# e.g. 100.94.x.x  ← use THIS as RPI_HOST in GitHub Secret
Step 5 — Add GitHub Secrets
Go to your repo on GitHub:
Settings → Secrets and variables → Actions → New repository secret

Add these 3 secrets one by one:

Secret 1 — SSH_PRIVATE_KEY

bash
# On RPi, print the private key:
cat ~/.ssh/matter_ci_rpi
# Copy EVERYTHING — from -----BEGIN to -----END line inclusive
Paste the entire output as the secret value.

Secret 2 — RPI_HOST

Value: your Tailscale IP  (e.g. 100.94.x.x)
Secret 3 — RPI_USER

Value: ubuntu
After adding all 3, it should look like this:

SSH_PRIVATE_KEY   ●●●●●●●●●●
RPI_HOST          ●●●●●●●●●●
RPI_USER          ●●●●●●●●●●
Step 6 — Update build_config.yaml with your SDK path
Edit the file and set where the SDK should be cloned on your RPi:

yaml
