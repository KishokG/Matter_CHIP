SSH_PRIVATE_KEY	Your ~/.ssh/matter_ci_rpi private key
RPI_HOST	IP/hostname of the Pi
RPI_USER	ubuntu or pi
GSHEET_SA_KEY_JSON	Full contents of the service account .json

