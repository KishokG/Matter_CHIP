name: Sync Matter TEDS CSV to Google Sheets

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Which stage(s) to run"
        type: choice
        options:
          - both
          - sync-only
          - analysis-only
        default: both
      release_name:
        description: "Optional: only sync this release (name from config/releases.json 'releases' list). Leave blank to sync all."
        required: false
        type: string
      analysis_name:
        description: "Optional: only run this analysis (name from config/releases.json 'analyses' list). Leave blank to run all."
        required: false
        type: string
  schedule:
    - cron: "0 14 * * *"      # runs daily at 14:00 UTC — edit or remove as needed

jobs:
  sync-knack-to-sheets:
    name: "Stage 1 — Download CSVs from Knack → Import to Google Sheets"
    if: github.event_name == 'schedule' || inputs.stage == 'both' || inputs.stage == 'sync-only'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install
        working-directory: ./matter-teds-sync/scripts

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: ./matter-teds-sync/scripts

      - name: Sync configured release(s) (Knack → Google Sheets)
        env:
          KNACK_APP_URL: ${{ secrets.KNACK_APP_URL }}
          KNACK_USERNAME: ${{ secrets.KNACK_USERNAME }}
          KNACK_PASSWORD: ${{ secrets.KNACK_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.CREDENTIALS_JSON }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: node sync-all.js
        working-directory: ./matter-teds-sync/scripts

      # Optional: keep copies of every downloaded CSV as a build artifact for debugging
      - name: Upload CSVs as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teds-exports
          path: matter-teds-sync/scripts/*.csv
          retention-days: 7

  run-analysis:
    name: "Stage 2 — Run SVE Results Analysis"
    needs: sync-knack-to-sheets
    if: |
      !cancelled() &&
      (
        github.event_name == 'schedule' ||
        inputs.stage == 'analysis-only' ||
        (inputs.stage == 'both' && needs.sync-knack-to-sheets.result == 'success')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        working-directory: ./matter-teds-sync/analysis

      - name: Write Google service account credentials
        run: echo "$GOOGLE_CREDENTIALS" > credentials.json
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.CREDENTIALS_JSON }}
        working-directory: ./matter-teds-sync/analysis

      - name: Run SVE results analysis
        env:
          ANALYSIS_NAME: ${{ inputs.analysis_name }}
        run: python TEDS_results.py
        working-directory: ./matter-teds-sync/analysis

      - name: Remove credentials file
        if: always()
        run: rm -f credentials.json
        working-directory: ./matter-teds-sync/analysis

      - name: Upload HTML report as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sve-summary-report
          path: matter-teds-sync/analysis/*.html
          retention-days: 30
