name: Sync Matter TEDS CSV to Google Sheets

on:
  workflow_dispatch: {}       # lets you click "Run workflow" manually in the Actions tab
  schedule:
    - cron: "0 6 * * *"       # runs daily at 06:00 UTC — edit or remove as needed

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install
        working-directory: ./matter-teds-sync/scripts

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: ./matter-teds-sync/scripts

      - name: Sync all configured releases (Knack → Google Sheets)
        env:
          KNACK_APP_URL: ${{ secrets.KNACK_APP_URL }}
          KNACK_USERNAME: ${{ secrets.KNACK_USERNAME }}
          KNACK_PASSWORD: ${{ secrets.KNACK_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: node sync-all.js
        working-directory: ./matter-teds-sync/scripts

      # Optional: keep copies of every downloaded CSV as a build artifact for debugging
      - name: Upload CSVs as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teds-exports
          path: scripts/*.csv
          retention-days: 7
