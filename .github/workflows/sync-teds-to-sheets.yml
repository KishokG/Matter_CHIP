name: Sync Matter TEDS CSV to Google Sheets

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Which stage(s) to run"
        type: choice
        options:
          - both
          - registration-only
          - results-only
        default: both
      save_as_schedule_default:
        description: "Also save the 'stage' selection above as the new default for future SCHEDULED (cron) runs, until changed again here"
        type: boolean
        default: false
      registration_release_name:
        description: "Optional: only sync this ONE registration release (name from config/releases.json 'releases' list, type=registration). Leave blank to sync all registration releases."
        required: false
        type: string
      results_release_name:
        description: "Optional: only sync this ONE event-results release (name from config/releases.json 'releases' list, type=results). Leave blank to sync all results releases."
        required: false
        type: string
      analysis_name:
        description: "Optional: only run this analysis (name from config/releases.json 'analyses' list). Leave blank to run all."
        required: false
        type: string
  schedule:
    - cron: "0 14 * * *"      # runs daily at 14:00 UTC — edit or remove as needed

permissions:
  contents: read
  actions: write   # needed to write the SCHEDULE_STAGE repo variable from "Save as new schedule default"

jobs:
  plan:
    name: "Determine which stage(s) to run"
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.decide.outputs.stage }}
      run_registration: ${{ steps.decide.outputs.run_registration }}
      run_results: ${{ steps.decide.outputs.run_results }}
    steps:
      - name: Decide
        id: decide
        run: |
          # For scheduled runs, which stage(s) to run is controlled by a repo
          # Variable (SCHEDULE_STAGE), settable either via Settings → Secrets
          # and variables → Actions → Variables, OR by ticking "Save as new
          # schedule default" on a manual run (see step below). Valid values:
          # both, registration-only, results-only. Defaults to "both" if unset.
          # For manual runs, the workflow_dispatch "stage" input wins instead.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            STAGE="${{ vars.SCHEDULE_STAGE }}"
            STAGE="${STAGE:-both}"
          else
            STAGE="${{ inputs.stage }}"
          fi

          case "$STAGE" in
            registration-only) RUN_REG=true;  RUN_RES=false ;;
            results-only)      RUN_REG=false; RUN_RES=true  ;;
            both)              RUN_REG=true;  RUN_RES=true  ;;
            *)
              echo "::warning::Unrecognized stage value '$STAGE' — defaulting to 'both'."
              STAGE="both"; RUN_REG=true; RUN_RES=true
              ;;
          esac

          echo "Resolved stage: $STAGE (run_registration=$RUN_REG, run_results=$RUN_RES)"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
          echo "run_registration=$RUN_REG" >> "$GITHUB_OUTPUT"
          echo "run_results=$RUN_RES" >> "$GITHUB_OUTPUT"

      - name: Save as new schedule default (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.save_as_schedule_default == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh variable set SCHEDULE_STAGE --body "${{ inputs.stage }}" --repo "${{ github.repository }}"
          echo "Saved SCHEDULE_STAGE=${{ inputs.stage }} — future scheduled runs will use this until changed again."

  sync-registration-data:
    name: "Stage 1 — Download TE/SVE Registration Data → Import to Google Sheets"
    needs: plan
    if: needs.plan.outputs.run_registration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install
        working-directory: ./matter-teds-sync/scripts

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: ./matter-teds-sync/scripts

      - name: Sync registration release(s) (Knack → Google Sheets)
        env:
          KNACK_APP_URL: ${{ secrets.KNACK_APP_URL }}
          KNACK_USERNAME: ${{ secrets.KNACK_USERNAME }}
          KNACK_PASSWORD: ${{ secrets.KNACK_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.CREDENTIALS_JSON }}
          RELEASE_TYPE: "registration"
          RELEASE_NAME: ${{ inputs.registration_release_name }}
        run: node sync-all.js
        working-directory: ./matter-teds-sync/scripts

      # Optional: keep copies of every downloaded CSV as a build artifact for debugging
      - name: Upload registration CSVs as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teds-registration-exports
          path: matter-teds-sync/scripts/*.csv
          retention-days: 7

  sync-results-and-analyze:
    name: "Stage 2 — Download TE/SVE Event Results → Import → Calculate Summary → Generate Report"
    needs: [plan, sync-registration-data]
    if: |
      !cancelled() &&
      needs.plan.outputs.run_results == 'true' &&
      (needs.sync-registration-data.result == 'success' || needs.sync-registration-data.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm install
        working-directory: ./matter-teds-sync/scripts

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: ./matter-teds-sync/scripts

      - name: Sync event-results release(s) (Knack → Google Sheets)
        env:
          KNACK_APP_URL: ${{ secrets.KNACK_APP_URL }}
          KNACK_USERNAME: ${{ secrets.KNACK_USERNAME }}
          KNACK_PASSWORD: ${{ secrets.KNACK_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.CREDENTIALS_JSON }}
          RELEASE_TYPE: "results"
          RELEASE_NAME: ${{ inputs.results_release_name }}
        run: node sync-all.js
        working-directory: ./matter-teds-sync/scripts

      - name: Upload event-results CSVs as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teds-results-exports
          path: matter-teds-sync/scripts/*.csv
          retention-days: 7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        working-directory: ./matter-teds-sync/results

      - name: Write Google service account credentials
        run: echo "$GOOGLE_CREDENTIALS" > credentials.json
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.CREDENTIALS_JSON }}
        working-directory: ./matter-teds-sync/results

      - name: Calculate pass/fail summary and generate report
        env:
          ANALYSIS_NAME: ${{ inputs.analysis_name }}
        run: python TEDS_results.py
        working-directory: ./matter-teds-sync/results

      - name: Remove credentials file
        if: always()
        run: rm -f credentials.json
        working-directory: ./matter-teds-sync/results

      - name: Upload HTML report as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sve-summary-report
          path: matter-teds-sync/results/*.html
          retention-days: 30
