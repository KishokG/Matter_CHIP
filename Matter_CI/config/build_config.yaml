# ============================================================
# Matter Build Configuration
# ============================================================

sdk:
  repo: "https://github.com/project-chip/connectedhomeip.git"
  branch: "master"
  sha: ""           # Leave empty for branch HEAD, or pin: e.g. "a1b2c3d"
  bootstrap: true   # Run scripts/bootstrap.sh after a fresh clone
  platform: "linux" # Submodule platform filter — uses checkout_submodules.py
                    # Options: linux, esp32, nrfconnect, android, darwin, etc.
  submodule_jobs: 4 # Parallel jobs for submodule checkout

# ============================================================
# Reference Apps
#
# Built using the real SDK helper:
#   scripts/examples/gn_build_example.sh <source_dir> <build_dir> [extra_gn_args]
#
# extra_gn_args are passed directly — no quoting needed in the value.
# ============================================================
apps:
  - name: "all-clusters-app"
    enabled: true
    source_dir: "examples/all-clusters-app/linux"
    build_dir:  "examples/all-clusters-app/linux/out/all-clusters-app"
    binary_name: "chip-all-clusters-app"
    # Exact args from your working manual command:
    extra_gn_args: "chip_inet_config_enable_ipv4=false"

  - name: "lighting-app"
    enabled: false
    source_dir: "examples/lighting-app/linux"
    build_dir:  "out/lighting-app"
    binary_name: "chip-lighting-app"
    extra_gn_args: "chip_inet_config_enable_ipv4=false"

  - name: "lock-app"
    enabled: false
    source_dir: "examples/lock-app/linux"
    build_dir:  "out/lock-app"
    binary_name: "chip-lock-app"
    extra_gn_args: "chip_inet_config_enable_ipv4=false"

  - name: "thermostat-app"
    enabled: false
    source_dir: "examples/thermostat/linux"
    build_dir:  "out/thermostat-app"
    binary_name: "chip-thermostat-app"
    extra_gn_args: "chip_inet_config_enable_ipv4=false"

  - name: "bridge-app"
    enabled: false
    source_dir: "examples/bridge-app/linux"
    build_dir:  "out/bridge-app"
    binary_name: "chip-bridge-app"
    extra_gn_args: "chip_inet_config_enable_ipv4=false"

# ============================================================
# chip-tool
#
# Manual command equivalent:
#   scripts/examples/gn_build_example.sh \
#       examples/chip-tool \
#       out/chip-tool \
#       'chip_mdns="platform" chip_inet_config_enable_ipv4=false'
# ============================================================
chip_tool:
  enabled: true
  source_dir: "examples/chip-tool"
  build_dir:  "out/chip-tool"
  binary_name: "chip-tool"
  extra_gn_args: 'chip_mdns="platform" chip_inet_config_enable_ipv4=false'

# ============================================================
# Python Controller
#
# Manual command equivalent:
#   source scripts/activate.sh
#   scripts/build_python.sh -m platform -d true -i python_env
#
# install_venv_name: the -i argument — venv created inside the SDK dir
# ============================================================
python_controller:
  enabled: true
  install_venv_name: "python_env"   # SDK creates <sdk_dir>/python_env/
  # Optional extra arguments passed directly to build_python.sh
  # Examples:
  #   "--enable_thread_meshcop true"
  #   "--enable_ble false"
  #   "--enable_thread_meshcop true --enable_ble false"
  # Leave empty string "" to pass no extra args
  extra_args: "--enable_thread_meshcop true"

# ============================================================
# Raspberry Pi target
# Actual values come from GitHub Secrets — these are just defaults/docs
# ============================================================
rpi:
  user: "ubuntu"
  host: "YOUR_RPI_IP"
  port: 22
  sdk_dir: "/home/ubuntu/connectedhomeip"

# ============================================================
# Google Sheets — Test Command Source
# ============================================================
google_sheets:
  spreadsheet_id: "1gBFM74LDa5quay68T061jiIWAa5eF4TJm6K83ccS6QA"   # from the sheet URL
  sheet_name: "Python Script Validation Procedure"   # tab name
  # Column indices (0-based: 0=A, 1=B, 2=C ...)
  columns:
    test_case_id: 2      # Column C — TC ID e.g. TC-ACE-1.2
    dut_command: 4       # Column E — sample app advertisement command
    python_command: 5    # Column F — python3 test command
  header_rows: 6         # rows to skip at top (instructions/headers)
  # service_account_key is written at runtime from CREDENTIALS_JSON GitHub Secret
  # Do NOT commit the actual key file to the repo
  service_account_key: "config/service_account.json"

# ============================================================
# Test Execution Settings
# ============================================================
test_execution:
  # .txt file listing TC IDs to run — one per line, # = comment
  tc_list_file: "config/tc_list.txt"
  # Per-test timeout in seconds
  timeout_seconds: 600
  # Seconds to wait after DUT launches before running test script
  dut_startup_wait: 5
  # Log and report output paths (relative to Matter_CI workspace)
  log_dir: "logs/test_runs"
  report_path: "logs/report.html"
  # admin_storage.json — cleared before each test
  admin_storage: "admin_storage.json"
