# ============================================================
# Matter Build Configuration
# ============================================================

sdk:
  repo: "https://github.com/project-chip/connectedhomeip.git"
  branch: "master"
  sha: ""           # Leave empty for branch HEAD, or pin: e.g. "a1b2c3d"
  bootstrap: true   # Run scripts/bootstrap.sh after a fresh clone
  platform: "linux" # Submodule platform filter — uses checkout_submodules.py
                    # Options: linux, esp32, nrfconnect, android, darwin, etc.
  submodule_jobs: 4 # Parallel jobs for submodule checkout

# ============================================================
# Reference Apps — DYNAMIC DISCOVERY + TEST-HARNESS BUILD PARITY
#
# There is no hardcoded source_dir/binary_name list. At build time,
# scripts/discover_targets.py resolves each app's real source_dir + binary
# from the SDK's own HostApp mapping. You only choose WHICH apps to build
# and with WHICH modifiers — every consumer (build_inside_container.sh,
# upload_artifacts.py, run_tests.py, fetch_test_commands.py) reads this same
# block via resolve_pipeline_apps(), so it is the single source of truth.
#
# Apps are built natively on the RPi with:
#   scripts/examples/gn_build_example.sh <source_dir> out/<name> <gn_args>
# where <gn_args> come from each app's `modifiers` — these mirror the Matter
# Test Harness targets (chip-cert-bins), so binaries match how the TH builds:
#   modifier        gn arg
#   --------        ------
#   ipv6only        chip_inet_config_enable_ipv4=false
#   platform-mdns   chip_mdns="platform"
#   nfc-commission  chip_enable_nfc_based_commissioning=true
#   nlfaultinject   chip_with_nlfaultinjection=true
#   rpc             import("//with_pw_rpc.gni")
#   clang           is_clang=true
#   no-werror       treat_warnings_as_errors=false  (escape hatch for an
#                   upstream -Werror-only failure, e.g. refrigerator; NOT a TH
#                   modifier — don't use on core cert apps)
#
# To build an app: flip its `enabled` to true. To regenerate this full menu
# (e.g. after an SDK bump adds apps):
#   python3 scripts/discover_targets.py --sdk-dir <SDK> --emit-config-apps
#
# chip-tool and the python controller are built by their own sections below.
# ============================================================
discovery:
  apps:
    # --- currently enabled (the pipeline's active DUT set) ---
    - { name: all-clusters,                enabled: true,  modifiers: [ipv6only] }        # chip-all-clusters-app
    - { name: light,                       enabled: true,  modifiers: [ipv6only] }        # chip-lighting-app
    - { name: lock,                        enabled: true,  modifiers: [ipv6only] }        # chip-lock-app
    - { name: thermostat,                  enabled: true,  modifiers: [ipv6only] }        # thermostat-app
    - { name: bridge,                      enabled: true,  modifiers: [ipv6only] }        # chip-bridge-app
    - { name: air-purifier,                enabled: true,  modifiers: [ipv6only] }        # chip-air-purifier-app
    - { name: evse,                        enabled: true,  modifiers: [ipv6only] }        # chip-evse-app
    - { name: closure,                     enabled: true,  modifiers: [ipv6only] }        # closure-app
    - { name: network-manager,             enabled: true,  modifiers: [ipv6only] }        # matter-network-manager-app (TC-ACL-2.x)
    # --- available, disabled by default (flip enabled: true to build) ---
    - { name: air-quality-sensor,          enabled: false, modifiers: [ipv6only] }        # air-quality-sensor-app
    - { name: all-clusters-minimal,        enabled: false, modifiers: [ipv6only] }        # chip-all-clusters-minimal-app
    - { name: all-devices,                 enabled: true,  modifiers: [clang, ipv6only] } # all-devices-app (clang: bundled miniaudio uses Clang-only __has_feature)
    - { name: camera,                      enabled: true, modifiers: [clang, ipv6only] } # chip-camera-app  (TH arm64: camera-clang-ipv6only)
    - { name: camera-controller,           enabled: true, modifiers: [ipv6only] }        # chip-camera-controller
    - { name: contact-sensor,              enabled: false, modifiers: [ipv6only] }        # contact-sensor-app
    - { name: dishwasher,                  enabled: false, modifiers: [ipv6only] }        # dishwasher-app
    - { name: energy-gateway,              enabled: true, modifiers: [ipv6only] }        # chip-energy-gateway-app
    - { name: fabric-admin,                enabled: true, modifiers: [rpc, ipv6only] }   # fabric-admin
    - { name: fabric-bridge,               enabled: true, modifiers: [rpc, ipv6only] }   # fabric-bridge-app
    - { name: fabric-sync,                 enabled: true, modifiers: [ipv6only] }        # fabric-sync
    - { name: jf-admin-app,                enabled: true, modifiers: [ipv6only] }        # jfa-app
    - { name: jf-control-app,              enabled: true, modifiers: [ipv6only] }        # jfc-app
    # SDK builds this as 'chip-lighting-app' (same as `light`) → binary_name
    # override deploys it under a distinct name so the two don't collide in the bundle.
    - { name: light-data-model-no-unique-id, enabled: true, modifiers: [ipv6only], binary_name: chip-lighting-data-model-no-unique-id-app }  # chip-lighting-data-model-no-unique-id-app
    - { name: lit-icd,                     enabled: true, modifiers: [ipv6only] }        # lit-icd-app
    - { name: microwave-oven,              enabled: true, modifiers: [ipv6only] }        # chip-microwave-oven-app
    - { name: ota-provider,                enabled: true, modifiers: [ipv6only] }        # chip-ota-provider-app
    - { name: ota-requestor,               enabled: true, modifiers: [ipv6only] }        # chip-ota-requestor-app
    - { name: refrigerator,                enabled: false,  modifiers: [no-werror, ipv6only] } # chip-refrigerator-app (no-werror: upstream -Werror bug)
    - { name: rvc,                         enabled: true, modifiers: [ipv6only] }        # chip-rvc-app
    - { name: terms-and-conditions,        enabled: true, modifiers: [ipv6only] }        # chip-terms-and-conditions-app
    - { name: tv-app,                      enabled: true, modifiers: [ipv6only] }        # chip-tv-app
    - { name: tv-casting-app,              enabled: true, modifiers: [ipv6only] }        # chip-tv-casting-app
    - { name: water-heater,                enabled: true, modifiers: [ipv6only] }        # matter-water-heater-app
    - { name: water-leak-detector,         enabled: false, modifiers: [ipv6only] }        # water-leak-detector-app


# ============================================================
# chip-tool  (built separately — tests require it)
#
# Matches the Test Harness target:
#   linux-<arch>-chip-tool-ipv6only-platform-mdns-nfc-commission
# ============================================================
chip_tool:
  enabled: true
  source_dir: "examples/chip-tool"
  build_dir:  "out/chip-tool"
  binary_name: "chip-tool"
  extra_gn_args: 'chip_mdns="platform" chip_inet_config_enable_ipv4=false chip_enable_nfc_based_commissioning=true chip_device_config_enable_thread_meshcop=true'

# ============================================================
# Python Controller
#
# Matter Test Harness builds this (chip-cert-bins Dockerfile) with:
#   scripts/build_python.sh -m platform -d true --enable_nfc true -i out/python_env
#
# build.sh always passes: -m platform -d true -i <install_venv_name>
# extra_args below appends the rest. We match the TH (--enable_nfc true) and
# ALSO keep --enable_thread_meshcop true (needed for our Thread testing; the
# TH does not set it). ble stays on (build_python.sh default, as in the TH).
#
# install_venv_name: the -i argument — venv created inside the SDK dir
# ============================================================
python_controller:
  enabled: true
  install_venv_name: "python_env"   # SDK creates <sdk_dir>/python_env/
  # Appended to build_python.sh after "-m platform -d true -i <venv>".
  # TH parity = "--enable_nfc true"; we add "--enable_thread_meshcop true" too.
  # Leave empty string "" to pass no extra args.
  extra_args: "--enable_nfc true --enable_thread_meshcop true"

# ============================================================
# Raspberry Pi target
# Actual values come from GitHub Secrets — these are just defaults/docs
# ============================================================
rpi:
  user: "ubuntu"
  host: "YOUR_RPI_IP"
  port: 22
  sdk_dir: "/home/ubuntu/connectedhomeip"

# ============================================================
# Google Drive — Build Artifact Upload
# ============================================================
google_drive:
  # Google Drive folder ID where builds will be uploaded
  # Get from Drive URL: drive.google.com/drive/folders/FOLDER_ID_HERE
  # Share this folder with your service account email (from CREDENTIALS_JSON)
  folder_id: "1ybtBIn_hS6wuszVkdeWMC8dNi1JRZTOB"
  # All builds go into this ONE folder (no latest/history subfolders). Each build
  # is a uniquely-named file whose own permanent ID is what the email link uses,
  # so a link stays valid until its bundle is pruned. keep_history = how many of
  # the newest bundles to keep = how long an emailed link stays downloadable.
  keep_history: 10
  # Upload only on fully successful builds (all enabled targets built)
  # Set to true to upload even partial builds
  upload_on_partial: true
  
# ============================================================
# Google Sheets — Test Command Source
# ============================================================
google_sheets:
  spreadsheet_id: "1gBFM74LDa5quay68T061jiIWAa5eF4TJm6K83ccS6QA"   # from the sheet URL
  sheet_name: "Python Script Validation Procedure"   # tab name
  # Column indices (0-based: 0=A, 1=B, 2=C ...)
  columns:
    test_case_id: 2      # Column C — TC ID e.g. TC-ACE-1.2
    dut_command: 4       # Column E — sample app advertisement command
    python_command: 5    # Column F — python3 test command
  header_rows: 6         # rows to skip at top (instructions/headers)
  # Note: service_account.json is written at runtime from CREDENTIALS_JSON GitHub Secret
  # It is never stored in the repo — do NOT add it to git

# ============================================================
# Test Execution Settings
# ============================================================
storage:
  # Keep last N test result runs in ~/matter-ci-results/
  keep_runs: 10
  # Warn when free disk space drops below this (GB)
  min_free_gb: 10
  # Error (block build) when free space drops below this (GB)
  critical_free_gb: 5

test_execution:
  # .txt file listing TC IDs to run — one per line, # = comment
  tc_list_file: "config/tc_list.json"   # JSON format — see tc_list.json for structure
  # Per-test timeout in seconds
  timeout_seconds: 600
  # Seconds to wait after DUT launches before running the test script. The
  # all-clusters app needs time to boot, init a fresh KVS, open its commissioning
  # window, and publish mDNS — too short causes "Not connected" / PASE races
  # (esp. AccessChecker/TC-ACE-2.x). 8-10s is safer than 5 on an RPi.
  dut_startup_wait: 8
  # Seconds to wait AFTER a DUT is stopped, before the next test relaunches on
  # the same discriminator — lets stale mDNS records / UDP ports clear.
  dut_settle_wait: 2
  # Discriminator (12-bit, 0-4095) the DUT is advertised on AND the controller
  # commissions to. Overrides the SDK default (3840) in BOTH the DUT command and
  # the python command — pick a value unlikely to clash with others on the same
  # network. Leave empty ("") to keep whatever the Google Sheet command specifies.
  discriminator: 3822
  # Log and report output paths (relative to Matter_CI workspace)
  log_dir: "logs/test_runs"
  report_path: "logs/report.html"
  # admin_storage.json — cleared before each test
  admin_storage: "admin_storage.json"
  # Pass tolerance: a run with some SKIPPED steps still counts as a full PASS
  # (green) when at least this % of its steps passed — the rest are treated as
  # acceptable (often DUT-implementation / feature dependent). Below this, it is
  # reported as PASS* (partial). e.g. 8 passed + 2 skipped of 10 = 80% ≥ 75% → PASS.
  pass_threshold_percent: 75
  # Retry settings
  retry_on_commissioning_failure: 1    # retries if commissioning fails
  retry_on_step_failure: 1             # retries if any test step fails
  # PICS file path — used when python command contains --PICS parameter
  # Set to empty string "" to skip PICS injection
  pics_folder: "/home/ubuntu/Matter_1_6_Final_PICS_XML_For_RPI"    # e.g. "config/pics/all-clusters.yaml"
